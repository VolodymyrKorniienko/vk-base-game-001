<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="25%" style="stop-color:#191432"/>
      <stop offset="50%" style="stop-color:#281941"/>
      <stop offset="75%" style="stop-color:#231e4b"/>
      <stop offset="100%" style="stop-color:#141932"/>
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong Glow Filter -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Ambient Glow Orbs -->
  <circle cx="300" cy="200" r="200" fill="rgba(102, 126, 234, 0.15)" filter="url(#strongGlow)"/>
  <circle cx="900" cy="400" r="180" fill="rgba(118, 75, 162, 0.12)" filter="url(#strongGlow)"/>
  <circle cx="600" cy="500" r="150" fill="rgba(240, 147, 251, 0.08)" filter="url(#strongGlow)"/>
  
  <!-- Main Title -->
  <text x="600" y="140" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="72" font-weight="800" fill="url(#textGradient)" filter="url(#glow)" letter-spacing="-2">
    IMPROVE YOUR
  </text>
  <text x="600" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="72" font-weight="800" fill="url(#textGradient)" filter="url(#glow)" letter-spacing="-2">
    MEMORY
  </text>
  
  <!-- Brain Icon -->
  <g transform="translate(550, 260)" filter="url(#glow)">
    <circle cx="50" cy="50" r="60" fill="rgba(102, 126, 234, 0.2)" stroke="rgba(102, 126, 234, 0.6)" stroke-width="3">
      <animate attributeName="r" values="60;65;60" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="70" text-anchor="middle" font-size="60">🧠</text>
  </g>
  
  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24" font-weight="400" fill="rgba(255, 255, 255, 0.75)" letter-spacing="0.5">
    Train your brain • Earn NFT rewards
  </text>
  
  <!-- Feature Cards -->
  <g transform="translate(150, 400)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="260" height="140" rx="16" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="2"/>
    <text x="30" y="50" font-size="40">🎯</text>
    <text x="30" y="85" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="white">6 Levels</text>
    <text x="30" y="110" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255, 255, 255, 0.6)">Progressive difficulty</text>
  </g>
  
  <g transform="translate(470, 400)">
    <!-- Card 2 -->
    <rect x="0" y="0" width="260" height="140" rx="16" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="2"/>
    <text x="30" y="50" font-size="40">⭐</text>
    <text x="30" y="85" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="white">3-Star Rating</text>
    <text x="30" y="110" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255, 255, 255, 0.6)">Beat your best score</text>
  </g>
  
  <g transform="translate(790, 400)">
    <!-- Card 3 -->
    <rect x="0" y="0" width="260" height="140" rx="16" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.12)" stroke-width="2"/>
    <text x="30" y="50" font-size="40">🏆</text>
    <text x="30" y="85" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="url(#goldGradient)">NFT Rewards</text>
    <text x="30" y="110" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="rgba(255, 255, 255, 0.6)">≤20 moves = NFT!</text>
  </g>
  
  <!-- Base Logo / Powered by -->
  <g transform="translate(600, 580)">
    <text x="0" y="0" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="rgba(255, 255, 255, 0.5)" letter-spacing="1">POWERED BY</text>
    <text x="0" y="25" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="2">BASE</text>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="4" fill="rgba(102, 126, 234, 0.6)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="80" r="6" fill="rgba(240, 147, 251, 0.5)">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="550" r="5" fill="rgba(118, 75, 162, 0.6)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
